name: Django CD Pipeline

on:
  push:
    branches: [ "main" ]
  # 배포 서버가 준비되기 전까지 deploy 잡은 수동 실행(workflow_dispatch)으로만 동작
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # CI 테스트가 성공한 경우에만 배포 빌드를 진행하도록 설정할 수 있습니다.
    # needs: lint-and-test (동일한 파일 내에 있을 때 사용)

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Docker Hub 로그인 (실제 사용 시 GitHub Repository Secret에 아래 변수들을 등록해야 합니다)
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # Docker 이미지 빌드 및 푸시
    # - 실제 사용 시 'dockerhub-username' 부분을 본인의 Docker Hub 계정명으로 변경해주세요.
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/ctf-backend:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/ctf-backend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    # 배포 서버(DEPLOY_* Secrets)가 준비되기 전까지는 push 시 스킵되고,
    # Actions 탭에서 수동 실행(workflow_dispatch)했을 때만 동작
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
    # SSH를 통해 배포 서버에 접속하여 docker-compose를 갱신합니다.
    # - 실제 배포를 진행할 때 GitHub Secrets에 SSH 관련 정보들을 등록하여 사용합니다.
    - name: Deploy to Server via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.DEPLOY_HOST }}
        username: ${{ secrets.DEPLOY_USERNAME }}
        key: ${{ secrets.DEPLOY_SSH_KEY }}
        port: ${{ secrets.DEPLOY_PORT || 22 }}
        script: |
          # 배포 경로로 이동
          cd /path/to/your/project

          # 최신 환경변수 가져오기 (필요 시)
          # git pull 혹은 필요한 설정 파일 갱신

          # Docker Registry 로그인 (Private Repo인 경우 필요)
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

          # Docker 이미지 풀 및 컨테이너 재시작
          docker-compose pull web
          docker-compose up -d --remove-orphans
