name: Django CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ctf_db_test
          POSTGRES_USER: ctf_user
          POSTGRES_PASSWORD: ctf_password_secure_123
        ports:
          - 5432:5432
        # 서비스가 완전히 준비될 때까지 대기
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.12.13
      uses: actions/setup-python@v5
      with:
        python-version: '3.12.13'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        fi

    - name: Run Linter (Black & Flake8)
      run: |
        # Django 프로젝트 코드가 존재할 경우 Lint 검사 실행
        if [ -d "app" ] || ls *.py 1> /dev/null 2>&1; then
          echo "Running Lint checks..."
          black --check . || true
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        else
          echo "No python files found to lint. Skipping."
        fi

    - name: Run Tests
      env:
        DEBUG: "False"
        SECRET_KEY: "django-insecure-ci-test-key-do-not-use-in-prod"
        POSTGRES_DB: ctf_db_test
        POSTGRES_USER: ctf_user
        POSTGRES_PASSWORD: ctf_password_secure_123
        DATABASE_HOST: localhost
        DATABASE_PORT: 5432
        REDIS_URL: redis://localhost:6379/0
      run: |
        # manage.py가 존재하는 경우에만 Django 테스트 실행
        if [ -f manage.py ]; then
          python manage.py test
        else
          echo "manage.py not found. Django project might not be created yet. Skipping tests."
        fi

  docker-build-check:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Test Docker Build
      run: |
        # Dockerfile이 존재할 경우 빌드 검증 수행
        if [ -f Dockerfile ]; then
          docker build . --file Dockerfile --tag ctf-backend:test
        else
          echo "Dockerfile not found. Skipping docker build."
        fi
